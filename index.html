<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHA Fournitures</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
        }

        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        nav {
            background: #222;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .btn {
            background: #00b894;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #00b894;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Pack Fournitures</h1>
        <p>Par des élèves </p>
        <p>Pour des élèves </p>
    </header>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="produit.html">Produits</a>
    </nav>

    <div class="container">

        <div class="card">
            <h2>À propos</h2>
            <p>Ce projet a été créé pour aider les élèves les plus démunis à pouvoir se procurer des affaires scolaires.
            </p>
        </div>

        <div class="card" id="contact">
            <h2>Contact</h2>

            <form action="https://formspree.io/f/xlgolbyb" method="POST">
                <input type="text" name="name" placeholder="Votre nom" required>
                <input type="email" name="email" placeholder="Votre email" required>
                <textarea name="message" placeholder="Votre message" required></textarea>
                <button type="submit">Envoyer</button>
            </form>

        </div>

    </div>

    <footer>
        <p>© Lycée Professionel Amédée Gasquet</p>
    </footer>

</body>

</html>
